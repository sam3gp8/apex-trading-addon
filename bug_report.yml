name: Build and Publish APEX Add-on

on:
  push:
    branches:
      - main
    paths:
      - "apex_trading/**"
      - ".github/workflows/build.yml"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.1.0)"
        required: false
        default: ""

env:
  ADDON_SLUG: apex_trading
  REGISTRY: ghcr.io

jobs:
  # ── Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint Add-on Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pyyaml
        run: pip3 install pyyaml

      - name: Validate config.yaml
        run: |
          python3 -c "
          import yaml, sys
          with open('apex_trading/config.yaml') as f:
              cfg = yaml.safe_load(f)
          required = ['name', 'version', 'slug', 'description', 'arch']
          for key in required:
              if key not in cfg:
                  print(f'ERROR: Missing required key: {key}')
                  sys.exit(1)
          print(f'OK: config.yaml valid — {cfg[\"name\"]} v{cfg[\"version\"]}')
          "

      - name: Validate repository.json
        run: |
          python3 -c "
          import json, sys
          with open('repository.json') as f:
              repo = json.load(f)
          for key in ['name', 'url']:
              if key not in repo:
                  print(f'ERROR: repository.json missing: {key}')
                  sys.exit(1)
          print('OK: repository.json valid')
          "

      - name: Check Python syntax
        run: |
          python3 -m py_compile apex_trading/rootfs/opt/apex/server.py
          echo "OK: server.py syntax valid"

      - name: Check shell scripts
        run: |
          for f in install.sh \
            apex_trading/rootfs/etc/s6-overlay/s6-rc.d/apex/run \
            apex_trading/rootfs/etc/s6-overlay/s6-rc.d/init-apex/run; do
            [ -f "$f" ] && bash -n "$f" && echo "OK: $f"
          done

  # ── Build Docker images ────────────────────────────────────────
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:latest
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:latest
          - arch: armv7
            platform: linux/arm/v7
            base: ghcr.io/home-assistant/armv7-base:latest
          - arch: armhf
            platform: linux/arm/v6
            base: ghcr.io/home-assistant/armhf-base:latest
          - arch: i386
            platform: linux/386
            base: ghcr.io/home-assistant/i386-base:latest
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          pip3 install pyyaml
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('apex_trading/config.yaml'))['version'])")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building: ${{ matrix.arch }} v${VERSION} from ${{ matrix.base }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apex_trading
          file: apex_trading/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/apex-trading-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/apex-trading-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          labels: |
            org.opencontainers.image.title=APEX Trading AI (${{ matrix.arch }})
            org.opencontainers.image.description=AI trading bot for Home Assistant
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Create GitHub Release ──────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          zip -r apex-trading-addon-v${{ steps.version.outputs.version }}.zip \
            apex_trading/ install.sh repository.json README.md CHANGELOG.md LICENSE \
            --exclude "*.pyc" --exclude "*__pycache__*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "APEX Trading AI v${{ steps.version.outputs.version }}"
          body: |
            ## APEX Trading AI v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.

            ### Quick Install
            **Add this repository to Home Assistant:**
            ```
            https://github.com/${{ github.repository }}
            ```

            **Or one-liner via SSH / HA Terminal:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```
          files: |
            apex-trading-addon-v${{ steps.version.outputs.version }}.zip
            install.sh
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
